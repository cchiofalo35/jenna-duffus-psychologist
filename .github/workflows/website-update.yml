name: Website Update from Jenna

on:
  issues:
    types: [opened, labeled]

jobs:
  update-website:
    if: contains(github.event.issue.labels.*.name, 'website-update')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Edit,Bash,Write,Read,Grep,Glob"
          prompt: |
            A website update has been requested by Jenna (the site owner). Here is her request:

            Title: ${{ github.event.issue.title }}

            Details: ${{ github.event.issue.body }}

            Please make the requested changes to the website. Follow the guidelines in CLAUDE.md.
            Only change what was specifically requested — do not modify anything else.
            After making changes, commit them directly to the main branch and push.
            Do NOT create a pull request. Commit and push directly to main.
            After pushing, close this issue with a comment summarizing what was changed.
            If the request is unclear, add a comment to this issue asking for clarification instead of guessing.
